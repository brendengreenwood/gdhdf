<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pricing Tool — System Architecture</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0e1a;
    font-family: 'IBM Plex Sans', sans-serif;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 32px;
  }

  header {
    width: 100%;
    max-width: 1100px;
    margin-bottom: 40px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 1px solid #1e2a40;
    padding-bottom: 20px;
  }

  header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #4a90d9;
  }

  header p {
    font-size: 11px;
    color: #4a5568;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.05em;
  }

  .diagram-wrapper {
    width: 100%;
    max-width: 1100px;
    background: #0d1221;
    border: 1px solid #1a2540;
    border-radius: 4px;
    padding: 48px;
    position: relative;
  }

  svg {
    width: 100%;
    height: auto;
    overflow: visible;
  }

  .legend {
    display: flex;
    gap: 32px;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid #1a2540;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    color: #64748b;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.05em;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 1px;
  }
</style>
</head>
<body>

<header>
  <h1>Pricing Tool — System Architecture</h1>
  <p>Working Draft · March 2026</p>
</header>

<div class="diagram-wrapper">
<svg viewBox="0 0 1020 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arrow markers -->
    <marker id="arr-default" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2d4a6e"/>
    </marker>
    <marker id="arr-accent" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a90d9"/>
    </marker>
    <marker id="arr-feedback" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e67e22"/>
    </marker>
    <marker id="arr-ext" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a5568"/>
    </marker>

    <!-- Layer fills -->
    <linearGradient id="grad-ui" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2e4a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0f1c30" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="grad-app" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#162438" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0c1620" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="grad-ml" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2e1a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0e1a0e" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="grad-ext" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#201a10" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#141008" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- ─── LAYER BANDS ─── -->

  <!-- UI Layer -->
  <rect x="10" y="10" width="440" height="140" rx="3" fill="url(#grad-ui)" stroke="#1e3a5f" stroke-width="1"/>
  <text x="24" y="28" font-family="IBM Plex Mono, monospace" font-size="9" fill="#2d6a9f" letter-spacing="0.12em" text-transform="uppercase" font-weight="600">PRESENTATION LAYER</text>

  <!-- App Layer -->
  <rect x="10" y="170" width="620" height="420" rx="3" fill="url(#grad-app)" stroke="#1e3a5f" stroke-width="1"/>
  <text x="24" y="188" font-family="IBM Plex Mono, monospace" font-size="9" fill="#2d6a9f" letter-spacing="0.12em" font-weight="600">APPLICATION LAYER</text>

  <!-- ML Layer -->
  <rect x="650" y="170" width="200" height="190" rx="3" fill="url(#grad-ml)" stroke="#1e4a1e" stroke-width="1"/>
  <text x="664" y="188" font-family="IBM Plex Mono, monospace" font-size="9" fill="#2d7a2d" letter-spacing="0.12em" font-weight="600">ML SERVICE</text>

  <!-- External Layer -->
  <rect x="650" y="380" width="360" height="210" rx="3" fill="url(#grad-ext)" stroke="#4a3a10" stroke-width="1"/>
  <text x="664" y="398" font-family="IBM Plex Mono, monospace" font-size="9" fill="#8a6a20" letter-spacing="0.12em" font-weight="600">EXTERNAL SYSTEMS</text>

  <!-- ─── NODES ─── -->

  <!-- Dashboard -->
  <rect x="40" y="50" width="160" height="76" rx="2" fill="#0f1e35" stroke="#2563a8" stroke-width="1.5"/>
  <text x="120" y="82" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="12" font-weight="600" fill="#7ab3e0">Dashboard</text>
  <text x="120" y="98" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#4a6a8a">Map Canvas</text>

  <!-- Revision Canvas -->
  <rect x="240" y="50" width="160" height="76" rx="2" fill="#0f1e35" stroke="#2563a8" stroke-width="1.5"/>
  <text x="320" y="82" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="12" font-weight="600" fill="#7ab3e0">Revision Canvas</text>
  <text x="320" y="98" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#4a6a8a">Input Variables</text>

  <!-- API Layer -->
  <rect x="200" y="210" width="220" height="76" rx="2" fill="#0c1a2e" stroke="#1e4a7a" stroke-width="1.5"/>
  <text x="310" y="244" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="12" font-weight="600" fill="#5a9fd4">API Layer</text>
  <text x="310" y="260" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#3a6080">Auth · Validation · Orchestration</text>

  <!-- Postgres -->
  <rect x="40" y="340" width="160" height="76" rx="2" fill="#0c1a2e" stroke="#1e4a7a" stroke-width="1.5"/>
  <text x="120" y="374" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="12" font-weight="600" fill="#5a9fd4">Postgres</text>
  <text x="120" y="390" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#3a6080">Primary Data Store</text>

  <!-- Redis -->
  <rect x="240" y="340" width="160" height="76" rx="2" fill="#0c1a2e" stroke="#1e4a7a" stroke-width="1.5"/>
  <text x="320" y="374" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="12" font-weight="600" fill="#5a9fd4">Redis</text>
  <text x="320" y="390" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#3a6080">Cache Layer</text>

  <!-- Job Queue -->
  <rect x="440" y="340" width="160" height="76" rx="2" fill="#0c1a2e" stroke="#1e4a7a" stroke-width="1.5"/>
  <text x="520" y="368" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="12" font-weight="600" fill="#5a9fd4">Job Queue</text>
  <text x="520" y="384" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#3a6080">Async Cascade</text>
  <text x="520" y="400" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#3a6080">on Revision Save</text>

  <!-- Feedback Store -->
  <rect x="40" y="470" width="160" height="76" rx="2" fill="#0c1a2e" stroke="#c0641a" stroke-width="1.5"/>
  <text x="120" y="504" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="12" font-weight="600" fill="#e08040">Feedback Store</text>
  <text x="120" y="520" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#8a5030">Append-only Event Log</text>

  <!-- ML Service -->
  <rect x="670" y="210" width="160" height="76" rx="2" fill="#0c1e0c" stroke="#1e6a1e" stroke-width="1.5"/>
  <text x="750" y="244" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="12" font-weight="600" fill="#5ab45a">ML Service</text>
  <text x="750" y="260" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#3a7a3a">Shape + Pricing · Python</text>

  <!-- Salesforce -->
  <rect x="670" y="420" width="160" height="76" rx="2" fill="#1a140a" stroke="#6a4a10" stroke-width="1.5"/>
  <text x="750" y="454" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="12" font-weight="600" fill="#c8903a">Salesforce</text>
  <text x="750" y="470" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#7a5820">Producer Accounts</text>

  <!-- Middleware -->
  <rect x="860" y="420" width="140" height="76" rx="2" fill="#1a140a" stroke="#6a4a10" stroke-width="1.5"/>
  <text x="930" y="448" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="12" font-weight="600" fill="#c8903a">Middleware</text>
  <text x="930" y="464" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#7a5820">MuleSoft / Boomi</text>
  <text x="930" y="480" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#7a5820">/ Azure IS</text>

  <!-- SAP -->
  <rect x="860" y="524" width="140" height="56" rx="2" fill="#1a140a" stroke="#6a4a10" stroke-width="1.5"/>
  <text x="930" y="550" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="12" font-weight="600" fill="#c8903a">SAP</text>
  <text x="930" y="566" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#7a5820">ERP · Product · Customer</text>

  <!-- ─── EDGES ─── -->

  <!-- Dashboard ↔ Revision Canvas -->
  <line x1="200" y1="88" x2="240" y2="88" stroke="#2d4a6e" stroke-width="1" marker-end="url(#arr-default)"/>

  <!-- Dashboard → API -->
  <path d="M120,126 L120,210" stroke="#4a90d9" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr-accent)"/>
  <text x="130" y="172" font-family="IBM Plex Mono, monospace" font-size="8" fill="#2d6080">reads / writes</text>

  <!-- Revision Canvas → API -->
  <path d="M320,126 L320,210" stroke="#4a90d9" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr-accent)"/>
  <text x="330" y="172" font-family="IBM Plex Mono, monospace" font-size="8" fill="#2d6080">inputs</text>

  <!-- API → ML -->
  <path d="M420,248 L670,248" stroke="#4a90d9" stroke-width="1.5" fill="none" marker-end="url(#arr-accent)"/>
  <text x="530" y="238" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="8" fill="#2d6080">debounced call</text>

  <!-- ML → API (return) -->
  <path d="M670,264 L420,264" stroke="#2d7a2d" stroke-width="1.5" fill="none" marker-end="url(#arr-default)"/>
  <text x="530" y="278" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="8" fill="#2d6040">boundary pts + prices</text>

  <!-- API → Postgres -->
  <path d="M260,286 L160,340" stroke="#2d4a6e" stroke-width="1" fill="none" marker-end="url(#arr-default)"/>
  <text x="188" y="322" font-family="IBM Plex Mono, monospace" font-size="8" fill="#2d4060">r / w</text>

  <!-- API → Redis -->
  <path d="M310,286 L310,340" stroke="#2d4a6e" stroke-width="1" fill="none" marker-end="url(#arr-default)"/>
  <text x="316" y="318" font-family="IBM Plex Mono, monospace" font-size="8" fill="#2d4060">cache</text>

  <!-- API → Job Queue (on revision save) -->
  <path d="M360,286 L480,340" stroke="#4a90d9" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr-accent)"/>
  <text x="445" y="310" font-family="IBM Plex Mono, monospace" font-size="8" fill="#2d6080">revision save</text>

  <!-- Job Queue → Salesforce -->
  <path d="M560,380 L600,390 L660,440" stroke="#2d4a6e" stroke-width="1" fill="none" marker-end="url(#arr-default)"/>
  <text x="614" y="408" font-family="IBM Plex Mono, monospace" font-size="8" fill="#2d4060">bid prices</text>

  <!-- Job Queue → Middleware -->
  <path d="M600,390 L890,430" stroke="#2d4a6e" stroke-width="1" fill="none" marker-end="url(#arr-default)"/>
  <text x="760" y="418" font-family="IBM Plex Mono, monospace" font-size="8" fill="#2d4060">approved pricing</text>

  <!-- Middleware → SAP -->
  <path d="M930,496 L930,524" stroke="#4a3a10" stroke-width="1" fill="none" marker-end="url(#arr-ext)"/>
  <text x="936" y="514" font-family="IBM Plex Mono, monospace" font-size="8" fill="#5a4a20">ERP push</text>

  <!-- SAP → Middleware (reference data) -->
  <path d="M900,524 L900,496" stroke="#4a3a10" stroke-width="1" fill="none" stroke-dasharray="3,3" marker-end="url(#arr-ext)"/>

  <!-- Middleware → Redis (catalog sync) -->
  <path d="M860,432 L400,378" stroke="#4a3a10" stroke-width="1" fill="none" stroke-dasharray="3,3" marker-end="url(#arr-ext)"/>
  <text x="630" y="398" font-family="IBM Plex Mono, monospace" font-size="8" fill="#5a4a20">catalog sync</text>

  <!-- Salesforce → API (harvest inbound outcomes) -->
  <path d="M670,456 L430,270" stroke="#e67e22" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr-feedback)"/>
  <text x="570" y="360" font-family="IBM Plex Mono, monospace" font-size="8" fill="#c0641a">inbound outcomes</text>
  <text x="570" y="372" font-family="IBM Plex Mono, monospace" font-size="8" fill="#c0641a">harvested from SF</text>

  <!-- API → Feedback Store -->
  <path d="M250,286 L160,470" stroke="#e67e22" stroke-width="1.5" fill="none" marker-end="url(#arr-feedback)"/>
  <text x="165" y="386" font-family="IBM Plex Mono, monospace" font-size="8" fill="#c0641a">stitched to</text>
  <text x="165" y="398" font-family="IBM Plex Mono, monospace" font-size="8" fill="#c0641a">scenario + model ver.</text>

  <!-- Feedback Store → ML (serve for retraining) -->
  <path d="M200,508 L660,260" stroke="#e67e22" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr-feedback)"/>
  <text x="400" y="465" font-family="IBM Plex Mono, monospace" font-size="8" fill="#c0641a">served for retraining</text>

  <!-- Job Queue → Postgres (update originator lists) -->
  <path d="M480,378 L200,378" stroke="#2d4a6e" stroke-width="1" fill="none" marker-end="url(#arr-default)"/>
  <text x="340" y="396" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="8" fill="#2d4060">originator lists</text>

</svg>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#2563a8;"></div>
      Presentation Layer
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#1e4a7a;"></div>
      Application Layer
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#1e6a1e;"></div>
      ML Service
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#6a4a10;"></div>
      External Systems
    </div>
    <div class="legend-item" style="gap:14px">
      <svg width="28" height="12"><line x1="0" y1="6" x2="28" y2="6" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="4,3"/></svg>
      Primary Data Flow
    </div>
    <div class="legend-item" style="gap:14px">
      <svg width="28" height="12"><line x1="0" y1="6" x2="28" y2="6" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="5,3"/></svg>
      Feedback Loop
    </div>
    <div class="legend-item" style="gap:14px">
      <svg width="28" height="12"><line x1="0" y1="6" x2="28" y2="6" stroke="#4a3a10" stroke-width="1" stroke-dasharray="3,3"/></svg>
      Reference Data Sync
    </div>
  </div>
</div>

</body>
</html>
